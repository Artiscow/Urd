name: Tester

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editor/package-lock.json

      - name: Motor- og vernetester
        run: node --test tests/*.mjs

      - name: Installer editor-avhengigheter
        working-directory: editor
        run: npm ci

      - name: Valider eksempeldata mot skjemaene
        working-directory: editor
        run: npm run validate

      - name: Editoren bygger
        working-directory: editor
        run: npm run build

      - name: Committet editor-bygg matcher kilden
        # Bundelen i template/admin/assets er bygget artefakt som committes:
        # avviker den fra det kilden faktisk produserer, er den enten glemt
        # gjenbygget eller manipulert - begge skal stoppe CI.
        run: git diff --exit-code -- template/admin/assets
