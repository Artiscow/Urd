name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 4 * * 1'

jobs:
  analyze:
    name: Analyser (${{ matrix.language }})
    # Dependabot-PR-er har lesetilgang-token og kan ikke laste opp
    # CodeQL-resultater; analysen kjøres uansett på push etter merge.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v7
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # Den committede editor-bundelen er GENERERT kode (bygget fra editor/src,
          # som skannes): å analysere bundelen gir varsler på uleselige bundle-linjer,
          # og hvert bygg flytter linjenumrene så varslene gjenoppstår med nye numre.
          config: |
            paths-ignore:
              - template/admin/assets
      - uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'
